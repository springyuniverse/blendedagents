<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsightBoard — Analytics Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; color: #1a1a2e; line-height: 1.5; }
  .dashboard { max-width: 1120px; margin: 0 auto; padding: 24px 20px; }

  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; letter-spacing: -0.3px; }
  header h1 span { color: #6b7280; font-weight: 400; font-size: 13px; margin-left: 8px; }
  .controls { display: flex; gap: 10px; align-items: center; }
  select, button { font-family: inherit; font-size: 13px; padding: 7px 14px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; color: #374151; cursor: pointer; transition: border-color 0.15s; }
  select:hover, button:hover { border-color: #9ca3af; }
  select:focus, button:focus { outline: 2px solid #6366f1; outline-offset: -1px; }
  button.primary { background: #6366f1; color: #fff; border-color: #6366f1; font-weight: 600; }
  button.primary:hover { background: #4f46e5; }

  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e5e7eb; transition: box-shadow 0.15s; }
  .kpi-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .kpi-card .label { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .kpi-card .value { font-size: 28px; font-weight: 700; color: #1a1a2e; }
  .kpi-card .change { font-size: 12px; margin-top: 4px; font-weight: 500; }
  .kpi-card .change.up { color: #10b981; }
  .kpi-card .change.down { color: #ef4444; }

  .charts-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-panel { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e5e7eb; }
  .chart-panel h2 { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #374151; }

  .bar-chart { display: flex; align-items: flex-end; gap: 12px; height: 180px; padding-top: 10px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; background: linear-gradient(180deg, #818cf8, #6366f1); transition: height 0.3s ease; min-height: 4px; }
  .bar-label { font-size: 11px; color: #6b7280; margin-top: 6px; white-space: nowrap; }
  .bar-value { font-size: 10px; color: #374151; font-weight: 600; margin-bottom: 4px; }

  .funnel { display: flex; flex-direction: column; gap: 8px; }
  .funnel-stage { display: flex; align-items: center; gap: 12px; }
  .funnel-bar-wrap { flex: 1; position: relative; height: 32px; }
  .funnel-bar { height: 100%; border-radius: 4px; background: #6366f1; display: flex; align-items: center; padding: 0 10px; transition: width 0.3s ease; }
  .funnel-bar span { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; }
  .funnel-label { font-size: 12px; font-weight: 600; color: #374151; width: 60px; text-align: right; flex-shrink: 0; }
  .funnel-count { font-size: 12px; color: #6b7280; width: 50px; flex-shrink: 0; }

  .table-panel { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e5e7eb; }
  .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .table-header h2 { font-size: 14px; font-weight: 700; color: #374151; }
  .table-header .subtitle { font-size: 12px; color: #9ca3af; font-weight: 400; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; border-bottom: 2px solid #e5e7eb; }
  td { font-size: 13px; padding: 10px 12px; border-bottom: 1px solid #f3f4f6; color: #374151; }
  tr:hover td { background: #f9fafb; }
  .amount-negative { color: #ef4444; }
  .status { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .status.completed { background: #d1fae5; color: #065f46; }
  .status.pending { background: #fef3c7; color: #92400e; }
  .status.refunded { background: #fee2e2; color: #991b1b; }
  .table-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .table-footer span { font-size: 12px; color: #6b7280; }
  .pagination { display: flex; gap: 6px; }
  .pagination button { padding: 4px 10px; font-size: 12px; }
  .pagination button.active { background: #6366f1; color: #fff; border-color: #6366f1; }
  .dash-footer { text-align: center; padding: 20px 0 8px; font-size: 11px; color: #9ca3af; }
</style>
</head>
<body>
<div class="dashboard">

  <!-- Header -->
  <header>
    <h1>InsightBoard <span>Analytics Dashboard</span></h1>
    <div class="controls">
      <select id="dateRange">
        <option value="7">Last 7 Days</option>
        <option value="30" selected>Last 30 Days</option>
        <option value="90">Last 90 Days</option>
      </select>
      <select id="segment">
        <option value="all">All Segments</option>
        <option value="enterprise">Enterprise</option>
        <option value="smb">SMB</option>
        <option value="startup">Startup</option>
      </select>
      <button class="primary" id="exportBtn">Export CSV</button>
    </div>
  </header>

  <!-- KPI Cards -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- Charts: Revenue Trend + Conversion Funnel -->
  <div class="charts-row">
    <div class="chart-panel">
      <h2>Revenue Trend</h2>
      <div class="bar-chart" id="revenueChart"></div>
    </div>
    <div class="chart-panel">
      <h2>Conversion Funnel</h2>
      <div class="funnel" id="funnelChart"></div>
    </div>
  </div>

  <!-- Transactions Table -->
  <div class="table-panel">
    <div class="table-header">
      <h2>Recent Transactions <span class="subtitle">All recorded payments and refunds</span></h2>
    </div>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="txBody"></tbody>
    </table>
    <div class="table-footer">
      <span id="txInfo">1-10 of 23</span>
      <div class="pagination" id="txPagination"></div>
    </div>
  </div>

  <div class="dash-footer">InsightBoard v2.4.1 &mdash; Data refreshed Apr 14, 2026</div>
</div>

<script>
(function () {

  /* -------------------------------------------------------
     Transaction Data — 23 rows, 3 pages (10 + 10 + 3)
     Absolute-value sum of all amounts: $45,830.00
     ------------------------------------------------------- */
  var allTransactions = [
    { date: '2026-04-13', desc: 'Enterprise Plan \u2014 Acme Corp',       amount:  4500.00, status: 'completed', segment: 'enterprise' },
    { date: '2026-04-13', desc: 'SMB Monthly \u2014 Bloom Studio',        amount:  1450.00, status: 'completed', segment: 'smb'        },
    { date: '2026-04-12', desc: 'Startup Plan \u2014 NovaTech',           amount:   350.00, status: 'completed', segment: 'startup'    },
    { date: '2026-04-12', desc: 'Enterprise Add-on \u2014 Meridian Inc',  amount:  2800.00, status: 'pending',   segment: 'enterprise' },
    { date: '2026-04-11', desc: 'SMB Quarterly \u2014 Cedar & Stone',     amount:  3600.00, status: 'completed', segment: 'smb'        },
    { date: '2026-04-11', desc: 'Startup Plan \u2014 PixelForge',         amount:   350.00, status: 'completed', segment: 'startup'    },
    { date: '2026-04-10', desc: 'Enterprise Plan \u2014 Orion Group',     amount:  4500.00, status: 'completed', segment: 'enterprise' },
    { date: '2026-04-10', desc: 'Refund \u2014 Spark Digital',            amount:  -250.00, status: 'refunded',  segment: 'startup'    },
    { date: '2026-04-09', desc: 'SMB Monthly \u2014 Willow & Birch',      amount:  1380.00, status: 'completed', segment: 'smb'        },
    { date: '2026-04-09', desc: 'Startup Plan \u2014 Helios AI',          amount:   350.00, status: 'pending',   segment: 'startup'    },
    { date: '2026-04-08', desc: 'Enterprise Plan \u2014 Zenith Labs',     amount:  4500.00, status: 'completed', segment: 'enterprise' },
    { date: '2026-04-08', desc: 'SMB Annual \u2014 Coastal Media',        amount:  7200.00, status: 'completed', segment: 'smb'        },
    { date: '2026-04-07', desc: 'Startup Plan \u2014 Drift Analytics',    amount:   350.00, status: 'completed', segment: 'startup'    },
    { date: '2026-04-07', desc: 'Enterprise Add-on \u2014 Acme Corp',     amount:  1500.00, status: 'completed', segment: 'enterprise' },
    { date: '2026-04-06', desc: 'Refund \u2014 Cedar & Stone',            amount:  -800.00, status: 'refunded',  segment: 'smb'        },
    { date: '2026-04-06', desc: 'SMB Monthly \u2014 Verdant Inc',         amount:  1400.00, status: 'completed', segment: 'smb'        },
    { date: '2026-04-05', desc: 'Startup Plan \u2014 Nimbus Works',       amount:   350.00, status: 'completed', segment: 'startup'    },
    { date: '2026-04-05', desc: 'Enterprise Plan \u2014 Titan Solutions', amount:  4500.00, status: 'completed', segment: 'enterprise' },
    { date: '2026-04-04', desc: 'SMB Monthly \u2014 Jade Group',          amount:  1600.00, status: 'completed', segment: 'smb'        },
    { date: '2026-04-04', desc: 'Startup Plan \u2014 Fern & Co',          amount:   350.00, status: 'pending',   segment: 'startup'    },
    { date: '2026-04-03', desc: 'Enterprise Add-on \u2014 Zenith Labs',   amount:  2200.00, status: 'completed', segment: 'enterprise' },
    { date: '2026-04-03', desc: 'SMB Monthly \u2014 Borealis Design',     amount:  1200.00, status: 'completed', segment: 'smb'        },
    { date: '2026-04-02', desc: 'Startup Plan \u2014 Echo Robotics',      amount:   350.00, status: 'completed', segment: 'startup'    }
  ];

  var PAGE_SIZE = 10;
  var currentPage = 1;

  /* -------------------------------------------------------
     KPI / chart datasets: dateRange -> segment -> metrics
     ------------------------------------------------------- */
  var datasets = {
    '30': {
      all:        { revenue: 48250,  convRate: 3.2,  users: 1847, aov: 67.50,  funnel: [12400, 1847, 592, 397],   trend: [5800, 6200, 7100, 6900, 7400, 7650, 7200] },
      enterprise: { revenue: 28400,  convRate: 4.1,  users:  620, aov: 112.00, funnel: [3200,  620,  285, 198],   trend: [3400, 3800, 4200, 4100, 4500, 4600, 3800] },
      smb:        { revenue: 14200,  convRate: 2.8,  users:  810, aov: 54.00,  funnel: [5800,  810,  210, 142],   trend: [1600, 1800, 2100, 2000, 2200, 2300, 2200] },
      startup:    { revenue: 5650,   convRate: 1.9,  users:  417, aov: 28.50,  funnel: [3400,  417,   97,  57],   trend: [800,  600,  800,  800,  700,  750,  1200] }
    },
    '7': {
      all:        { revenue: 32100,  convRate: 3.2,  users: 1204, aov: 71.20,  funnel: [8640, 1204, 412, 289],    trend: [4100, 4600, 4800, 4500, 4900, 5100, 4100] },
      enterprise: { revenue: 19800,  convRate: 4.5,  users:  410, aov: 118.00, funnel: [2100,  410, 198, 142],    trend: [2600, 2900, 3100, 3000, 3200, 3300, 2700] },
      smb:        { revenue: 8900,   convRate: 2.6,  users:  530, aov: 52.00,  funnel: [4100,  530, 148, 102],    trend: [1100, 1200, 1300, 1100, 1300, 1400, 1000] },
      startup:    { revenue: 3400,   convRate: 2.1,  users:  264, aov: 32.00,  funnel: [2440,  264,  66,  45],    trend: [400,  500,  400,  400,  400,  400,  400]  }
    },
    '90': {
      all:        { revenue: 142600, convRate: 3.0,  users: 5420, aov: 64.80,  funnel: [38400, 5420, 1640, 1152], trend: [18200, 19400, 20100, 19800, 21200, 21800, 22100] },
      enterprise: { revenue: 84200,  convRate: 3.8,  users: 1800, aov: 108.00, funnel: [9800,  1800,  780,  548], trend: [10800, 11400, 12000, 11600, 12400, 12800, 13200] },
      smb:        { revenue: 41800,  convRate: 2.5,  users: 2400, aov: 50.00,  funnel: [18200, 2400,  600,  420], trend: [5200,  5600,  5800,  5800,  6200,  6400,  6800]  },
      startup:    { revenue: 16600,  convRate: 1.8,  users: 1220, aov: 26.00,  funnel: [10400, 1220,  260,  184], trend: [2200,  2400,  2300,  2400,  2600,  2600,  2100]  }
    }
  };

  var funnelLabels = ['Visits', 'Signups', 'Trials', 'Paid'];

  /* -------------------------------------------------------
     Helpers
     ------------------------------------------------------- */
  function getDateLabels(range) {
    var labels = [];
    var today = new Date('2026-04-14');
    var step = range === '90' ? 13 : range === '30' ? 4 : 1;
    for (var i = 6; i >= 0; i--) {
      var d = new Date(today);
      d.setDate(d.getDate() - i * step);
      labels.push((d.getMonth() + 1) + '/' + d.getDate());
    }
    return labels;
  }

  function fmtCurrency(n) {
    if (Math.abs(n) >= 1000) {
      return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0 });
    }
    return '$' + n.toFixed(2);
  }

  function fmtAmount(n) {
    if (n < 0) return '-$' + Math.abs(n).toFixed(2);
    return '$' + n.toFixed(2);
  }

  /* -------------------------------------------------------
     Render: KPI Cards
     ------------------------------------------------------- */
  function renderKPI(data) {
    var cards = [
      { label: 'Total Revenue',   value: fmtCurrency(data.revenue), change: '+12.4%', dir: 'up'   },
      { label: 'Conversion Rate', value: data.convRate + '%',        change: '+0.3pp', dir: 'up'   },
      { label: 'Active Users',    value: data.users.toLocaleString(), change: '+8.1%', dir: 'up'   },
      { label: 'Avg Order Value', value: '$' + data.aov.toFixed(2),  change: '-1.2%',  dir: 'down' }
    ];
    var html = '';
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      html += '<div class="kpi-card">' +
        '<div class="label">' + c.label + '</div>' +
        '<div class="value">' + c.value + '</div>' +
        '<div class="change ' + c.dir + '">' + c.change + '</div>' +
        '</div>';
    }
    document.getElementById('kpiRow').innerHTML = html;
  }

  /* -------------------------------------------------------
     Render: Revenue Bar Chart
     ------------------------------------------------------- */
  function renderRevenueChart(trend, range) {
    var max = Math.max.apply(null, trend);
    var labels = getDateLabels(range);
    var html = '';
    for (var i = 0; i < trend.length; i++) {
      var pct = (trend[i] / max) * 100;
      var dispVal = '$' + (trend[i] / 1000).toFixed(1) + 'k';
      html += '<div class="bar-col">' +
        '<span class="bar-value">' + dispVal + '</span>' +
        '<div class="bar" style="height:' + pct + '%"></div>' +
        '<span class="bar-label">' + labels[i] + '</span>' +
        '</div>';
    }
    document.getElementById('revenueChart').innerHTML = html;
  }

  /* -------------------------------------------------------
     Render: Conversion Funnel
     ------------------------------------------------------- */
  function renderFunnel(funnelData) {
    var max = funnelData[0];
    var html = '';
    for (var i = 0; i < funnelData.length; i++) {
      var v = funnelData[i];
      var pct = Math.max((v / max) * 100, 8);
      var convPct = i > 0 ? (v / funnelData[i - 1] * 100).toFixed(1) + '%' : '';
      html += '<div class="funnel-stage">' +
        '<span class="funnel-label">' + funnelLabels[i] + '</span>' +
        '<div class="funnel-bar-wrap">' +
        '<div class="funnel-bar" style="width:' + pct + '%">' +
        '<span>' + v.toLocaleString() + '</span>' +
        '</div></div>' +
        '<span class="funnel-count">' + convPct + '</span>' +
        '</div>';
    }
    document.getElementById('funnelChart').innerHTML = html;

    // Force the Trials and Paid bars narrow so their number labels
    // overflow and visually overlap each other
    var stages = document.querySelectorAll('#funnelChart .funnel-stage');
    if (stages.length >= 4) {
      var trialsBar  = stages[2].querySelector('.funnel-bar');
      var trialsSpan = stages[2].querySelector('.funnel-bar span');
      var paidBar    = stages[3].querySelector('.funnel-bar');
      var paidSpan   = stages[3].querySelector('.funnel-bar span');

      trialsBar.style.width      = '38px';
      trialsSpan.style.overflow   = 'visible';
      trialsSpan.style.position   = 'relative';
      trialsSpan.style.left       = '0';

      paidBar.style.width      = '34px';
      paidSpan.style.overflow   = 'visible';
      paidSpan.style.position   = 'relative';
      paidSpan.style.left       = '0';

      stages[2].style.marginBottom = '-4px';
    }
  }

  /* -------------------------------------------------------
     Render: Transactions Table with Pagination
     ------------------------------------------------------- */
  function renderTable(page) {
    currentPage = page;
    var start = (page - 1) * PAGE_SIZE;
    var rows = allTransactions.slice(start, start + PAGE_SIZE);
    var html = '';
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var amtClass = r.amount < 0 ? ' class="amount-negative"' : '';
      html += '<tr>' +
        '<td>' + r.date + '</td>' +
        '<td>' + r.desc + '</td>' +
        '<td' + amtClass + '>' + fmtAmount(r.amount) + '</td>' +
        '<td><span class="status ' + r.status + '">' +
        r.status.charAt(0).toUpperCase() + r.status.slice(1) +
        '</span></td></tr>';
    }
    document.getElementById('txBody').innerHTML = html;

    var total = allTransactions.length;
    var end = Math.min(start + PAGE_SIZE, total);
    document.getElementById('txInfo').textContent = (start + 1) + '\u2013' + end + ' of ' + total;

    var pages = Math.ceil(total / PAGE_SIZE);
    var btns = '';
    for (var p = 1; p <= pages; p++) {
      btns += '<button class="' + (p === page ? 'active' : '') +
        '" data-page="' + p + '">' + p + '</button>';
    }
    document.getElementById('txPagination').innerHTML = btns;
  }

  document.getElementById('txPagination').addEventListener('click', function (e) {
    if (e.target.tagName === 'BUTTON') {
      renderTable(parseInt(e.target.dataset.page, 10));
    }
  });

  /* -------------------------------------------------------
     Filter Controls & Refresh
     ------------------------------------------------------- */
  function getCurrentData() {
    var range = document.getElementById('dateRange').value;
    var seg   = document.getElementById('segment').value;
    return datasets[range][seg];
  }

  function refresh() {
    var data  = getCurrentData();
    var range = document.getElementById('dateRange').value;
    renderKPI(data);
    renderRevenueChart(data.trend, range);
    renderFunnel(data.funnel);
    renderTable(1);
  }

  // When date range changes, reset segment to "all" then refresh
  document.getElementById('dateRange').addEventListener('change', function () {
    document.getElementById('segment').value = 'all';
    refresh();
  });

  document.getElementById('segment').addEventListener('change', function () {
    refresh();
  });

  /* -------------------------------------------------------
     Export CSV — generates a downloadable file
     ------------------------------------------------------- */
  document.getElementById('exportBtn').addEventListener('click', function () {
    var range = document.getElementById('dateRange').value;
    var rangeLabel = range === '7'  ? 'last-7-days'
                   : range === '30' ? 'last-30-days'
                   :                  'last-90-days';

    var csv = 'Date,Description,Amount,Status\n';
    for (var i = 0; i < allTransactions.length; i++) {
      var r = allTransactions[i];
      csv += r.date + ',"' + r.desc + '",' + r.amount.toFixed(2) + ',' + r.status + '\n';
    }

    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = 'report-' + rangeLabel + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  /* -------------------------------------------------------
     Initialize dashboard with default filters
     ------------------------------------------------------- */
  refresh();

})();
</script>
</body>
</html>
